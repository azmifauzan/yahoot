services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: yahoot-app
    restart: unless-stopped
    volumes:
      - storage:/var/www/html/storage/app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yahoot

  nginx:
    image: nginx:1.27-alpine
    container_name: yahoot-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - yahoot

  postgres:
    image: postgres:17-alpine
    container_name: yahoot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-yahoot}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-yahoot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yahoot

  redis:
    image: redis:7-alpine
    container_name: yahoot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - yahoot

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: yahoot-reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    env_file:
      - .env
    ports:
      - "${REVERB_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yahoot

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: yahoot-queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yahoot

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: yahoot-scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yahoot

volumes:
  postgres_data:
  redis_data:
  storage:

networks:
  yahoot:
    driver: bridge
